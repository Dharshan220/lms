services:
  - type: web
    name: nanospark-lms
    runtime: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          name: nanospark-lms
          property: url
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: nanospark-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: nanospark-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: nanospark-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: nanospark-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: nanospark-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: MAIL_MAILER
        value: resend
      - key: MAIL_FROM_ADDRESS
        value: hello@nanospark.com
      - key: MAIL_FROM_NAME
        value: "Nano Spark LMS"

databases:
  - name: nanospark-db
    plan: free
    databaseName: nanospark_lms
